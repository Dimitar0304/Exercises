<form [formGroup]="form" (onSubmit)="onSubmit()">
    <div class="alert alert-danger" *ngIf="form?.errors?.['ivalidLogin']">Username or password is invalid</div>
    <div class="form-group">
        <label for="username">Username</label>
        <input
            formControlName="username"
            id="username"
            type="text"
            class="form-control">
            <div *ngIf="username?.pending">Checking for uniqness</div>
            <div *ngIf="username?.touched && username?.errors?.['required']" class="alert alert-danger">Username is required</div>
            <div *ngIf="username?.touched && username?.errors?.['minlength']" class="alert alert-danger">Min length is 3 characters</div>
            <div *ngIf="username?.errors?.['cannotExistWhiteSpace']" class="alert alert-danger">username can not exist white spaces</div>
             <div *ngIf="username?.errors?.['shouldBeUnique']" class="alert alert-danger">username shold be unique</div>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input
            formControlName="password"
            id="password"
            type="password"
            class="form-control"
            (click)="logOn()">
    </div>
    <button class="btn btn-primary" type="submit" (click)="onSubmit()"disabled>Sign Up</button>
</form>
